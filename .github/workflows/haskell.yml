name: Haskell CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 0. Configuración de permisos
    - name: Fix permissions for GHCup
      run: |
        sudo mkdir -p /usr/local/.ghcup
        sudo chown -R $USER:$USER /usr/local/.ghcup

    # 1. Caché de GHC y GHCup
    - name: Cache GHCup
      uses: actions/cache@v4
      with:
        path: |
          ~/.ghcup
          /usr/local/.ghcup
        key: ${{ runner.os }}-ghcup-9.10.3-v3

    # 2. Setup de Haskell
    - uses: haskell-actions/setup@v2
      with:
        ghc-version: '9.10.3'
        cabal-version: 'latest'

    # 3. Caché de dependencias y builds
    - name: Cache Cabal Store
      uses: actions/cache@v4
      with:
        path: |
          ~/.cabal/packages
          ~/.cabal/store
          dist-newstyle
        key: ${{ runner.os }}-cabal-${{ hashFiles('**/*.cabal') }}-${{ hashFiles('**/cabal.project') }}
        restore-keys: |
          ${{ runner.os }}-cabal-

    # 4. Instalación de dependencias
    - name: Install dependencies
      run: cabal build --only-dependencies --enable-tests --enable-benchmarks

    - name: Build
      run: cabal build --enable-tests --enable-benchmarks all

    - name: Run tests
      run: cabal test all
